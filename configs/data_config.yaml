# ============================================================
# Data Pipeline Configuration — experiment_design_v3.md 기준
# ============================================================

audio:
  sample_rate: 16000
  segment_duration: 4.0          # seconds
  segment_samples: 64000         # 16000 * 4

stft:
  n_fft: 512
  hop_length: 160                # 10ms @ 16kHz
  win_length: 400                # 25ms @ 16kHz
  window: hann

# ----------------------------------------------------------------
# BC 시뮬레이터
# ----------------------------------------------------------------
bc_simulator:
  # 2차 피킹 EQ
  peak_eq:
    center_freq: 1500            # Hz
    q_factor: 2.0
    gain_db: 6.0                 # boost
  # 4차 Butterworth LPF
  lpf:
    cutoff_freq: 4000            # Hz
    order: 4
  # 신체 잡음
  body_noise:
    heartbeat_freq: 1.0          # Hz
    heartbeat_amplitude_db: -30  # dB relative to signal RMS
    footstep_min_freq: 0.5       # Hz
    footstep_max_freq: 10.0      # Hz
    footstep_n_impulses_per_sec: [1, 5]  # range

# ----------------------------------------------------------------
# 포화 시뮬레이터
# ----------------------------------------------------------------
saturation:
  # 클리핑 임계값 (신호 피크 대비 비율)
  clip_level_range: [0.3, 0.9]
  # 회복 시간 (exponential decay, ms)
  tau_recovery_ms_range: [2.0, 5.0]
  # 다항식 비선형 차수
  poly_order_range: [3, 7]
  # 클리핑 검출 파라미터
  detection:
    threshold_ratio: 0.95
    consecutive_samples: 3
  # 소프트 마스크 temperature
  soft_mask_temperature: 0.1

# ----------------------------------------------------------------
# 충격음 합성
# ----------------------------------------------------------------
impulse_generator:
  gunshot:
    duration_ms: 50
    f0_range: [1000, 4000]       # Hz
    tau_attack_range: [0.001, 0.005]  # sec
    tau_reverb_range: [0.05, 0.2]    # sec
  explosion:
    duration_ms: 200
    f0_range: [20, 200]          # Hz
    tau_shock: 0.05              # sec
    tau_reverb: 0.1              # sec
    reverb_duration: 0.5         # sec

# ----------------------------------------------------------------
# Military 데이터셋
# ----------------------------------------------------------------
military:
  snr_range: [-20, 5]           # dB
  saturation_ratio_range: [0.3, 1.0]  # fraction of segments with saturation
  impulse_ratio_range: [0.4, 0.6]     # fraction of noise frames that are impulse
  # 실제 녹음 소음 비율 vs 합성 충격음 비율
  real_noise_fraction: 0.5       # Freesound/AudioSet 실제 녹음
  synth_impulse_fraction: 0.5    # 합성 충격음

# ----------------------------------------------------------------
# General 데이터셋
# ----------------------------------------------------------------
general:
  snr_range: [-10, 15]          # dB
  saturation_ratio_range: [0.0, 0.5]
  impulse_ratio_range: [0.0, 0.1]
  noise_dbs: [DEMAND, MUSAN, WHAM]

# ----------------------------------------------------------------
# 데이터 분할 (화자 기준)
# ----------------------------------------------------------------
split:
  train: 0.70
  val: 0.15
  test: 0.15
  seed: 42

# ----------------------------------------------------------------
# 데이터셋 크기
# ----------------------------------------------------------------
dataset:
  train_samples_per_env: 5000    # Military + General 각각
  val_samples_per_env: 1000
  test_samples_per_env: 1000

# ----------------------------------------------------------------
# 소음 DB 경로 (다운로드 후 설정)
# ----------------------------------------------------------------
paths:
  librispeech_root: data/raw/LibriSpeech
  demand_root: data/raw/DEMAND
  musan_root: data/raw/MUSAN
  wham_root: data/raw/WHAM
  freesound_root: data/raw/Freesound
  output_root: data/processed
